name: Deploy to GitHub Pages

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - .dockerignore
      - .eslintrc.json
      - .gitignore
      - .mise.toml
      - .nomedia
      - .prettierrc
      - Dockerfile
      - deno.json
      - docker-compose.yml
      - eslint.config.js
      - eslint.config.mjs
      - prettier.config.js
      - prettier.config.mjs
    branches:
      - "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get repository name
        run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV

      - name: Run Build
        run: pnpm build
        env:
          IS_GITHUB_PAGES: 'true'
          REPO_NAME: ${{ env.REPOSITORY_NAME }}

      - name: Inject OPFS filesystem
        run: |
          mv dist/service-worker.js dist/sw-jit.js
          cp patches/sw-fs.js dist/sw-fs.js
          cp patches/service-worker.js dist/service-worker.js
          cp patches/preload.js dist/preload.js

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'
          retention-days: 1
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
