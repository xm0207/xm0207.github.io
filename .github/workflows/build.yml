name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write  # 允许 Actions 推送代码到仓库

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Build
        run: pnpm build

      - name: Inject OPFS filesystem
        run: |
          mv dist/service-worker.js dist/sw-jit.js
          cp patches/sw-fs.js dist/sw-fs.js
          cp patches/service-worker.js dist/service-worker.js
          cp patches/preload.js dist/preload.js

      - name: Fix paths for GitHub Pages (Jekyll skips _/ and ./ dirs)
        run: |
          cd dist
          # Rename _virtual/ → virtual/ so Jekyll doesn't skip it
          if [ -d _virtual ]; then
            mv _virtual virtual
            find . -type f \( -name '*.js' -o -name '*.html' \) | xargs sed -i 's|_virtual/|virtual/|g; s|"_virtual"|"virtual"|g'
          fi
          # Rename files starting with _ inside virtual/ (Jekyll skips _* files at any depth)
          if [ -d virtual ]; then
            for f in virtual/_*.js; do
              [ -f "$f" ] || continue
              newname="virtual/$(basename "$f" | sed 's/^_*/vt-/')"
              mv "$f" "$newname"
            done
            # Update references: virtual/_foo.js → virtual/vt-foo.js
            find . -type f \( -name '*.js' -o -name '*.html' \) | xargs sed -i -E 's|virtual/_+|virtual/vt-|g'
          fi
          # Flatten node_modules/.pnpm/*/node_modules/PKG/... → deps/PKG/...
          if [ -d node_modules ]; then
            mkdir -p deps
            # Each package lives at node_modules/.pnpm/<name>@<ver>/node_modules/<pkg>/
            for pkg_dir in node_modules/.pnpm/*/node_modules/*; do
              pkg_name=$(basename "$pkg_dir")
              if [ -d "$pkg_dir" ] && [ ! -d "deps/$pkg_name" ]; then
                cp -r "$pkg_dir" "deps/$pkg_name"
              fi
            done
            # Rewrite references: node_modules/.pnpm/<anything>/node_modules/<pkg>/ → deps/<pkg>/
            find . -maxdepth 1 -type f \( -name '*.js' -o -name '*.html' \) -exec \
              sed -i -E 's|node_modules/\.pnpm/[^/]+/node_modules/|deps/|g' {} +
            find virtual -type f -name '*.js' -exec \
              sed -i -E 's|\.\./node_modules/\.pnpm/[^/]+/node_modules/|../deps/|g' {} + 2>/dev/null || true
            find deps -type f -name '*.js' -exec \
              sed -i -E 's|\.\./\.pnpm/[^/]+/node_modules/||g' {} + 2>/dev/null || true
            rm -rf node_modules
          fi

      - name: Deploy dist to branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir /tmp/dist
          cp -r dist/. /tmp/dist/

          git fetch origin
          git checkout --orphan gh-pages
          git reset --hard
          rm -rf *

          cp -r /tmp/dist/. .

          git add .
          git commit -m "Deploy dist from $GITHUB_SHA"
          git push -f origin gh-pages
