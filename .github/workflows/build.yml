name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write  # 允许 Actions 推送代码到仓库

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Build
        run: pnpm build

      - name: Inject OPFS filesystem
        run: |
          mv dist/service-worker.js dist/sw-jit.js
          cp patches/sw-fs.js dist/sw-fs.js
          cp patches/service-worker.js dist/service-worker.js
          cp patches/preload.js dist/preload.js

      - name: Fix paths for GitHub Pages (Jekyll skips _/ and ./ dirs)
        run: node patches/fix-paths.mjs dist

      - name: Deploy dist to branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir /tmp/dist
          cp -r dist/. /tmp/dist/

          git fetch origin
          git checkout --orphan gh-pages
          git reset --hard
          rm -rf *

          cp -r /tmp/dist/. .
          touch .nojekyll

          git add .
          git commit -m "Deploy dist from $GITHUB_SHA"
          git push -f origin gh-pages
